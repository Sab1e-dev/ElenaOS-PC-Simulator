<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ElenixOS Simulator</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0d1117;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    #app-shell {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      display: block;
      background: #000;
      outline: none;
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>

  <script>
    var BASE_WIDTH = 390;
    var BASE_HEIGHT = 450;
    var canvasElement = document.getElementById('canvas');

    function fitCanvas() {
      var dpr = window.devicePixelRatio || 1;
      var availableWidth = window.innerWidth;
      var availableHeight = window.innerHeight;
      var scale = Math.min(availableWidth / BASE_WIDTH, availableHeight / BASE_HEIGHT);
      var cssWidth = Math.max(1, Math.floor(BASE_WIDTH * scale));
      var cssHeight = Math.max(1, Math.floor(BASE_HEIGHT * scale));
      var backingWidth = Math.max(1, Math.floor(cssWidth * dpr));
      var backingHeight = Math.max(1, Math.floor(cssHeight * dpr));

      canvasElement.style.width = cssWidth + 'px';
      canvasElement.style.height = cssHeight + 'px';

      if (canvasElement.width !== backingWidth) canvasElement.width = backingWidth;
      if (canvasElement.height !== backingHeight) canvasElement.height = backingHeight;
    }

    window.addEventListener('resize', fitCanvas);
    window.addEventListener('orientationchange', fitCanvas);
    fitCanvas();

    var Module = {
      canvas: (function () {
        return canvasElement;
      })()
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
