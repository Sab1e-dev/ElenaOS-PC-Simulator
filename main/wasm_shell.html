<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ElenixOS Simulator</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0d1117;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    #app-shell {
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      max-width: 100vw;
      max-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      outline: none;
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>

  <script>
    var Module = {
      canvas: (function () {
        return document.getElementById('canvas');
      })()
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
